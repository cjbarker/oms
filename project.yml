name: OMS
options:
  bundleIdPrefix: com.oms
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  OMS:
    type: application
    platform: iOS
    sources:
      - path: OMS
    resources:
      - path: OMS/Resources
    info:
      path: OMS/Info.plist
      properties:
        CFBundleDisplayName: OMS
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.oms.app.weeklyRegen
        NSCameraUsageDescription: "OMS uses the camera to identify equipment in your workout space so your plan matches what you have."
        NSPhotoLibraryUsageDescription: "OMS can analyze a photo of your workout space to detect available equipment."
        NSHealthShareUsageDescription: "OMS reads recent sleep, activity, and heart-rate data so your coach can tune today's workout to how recovered you are."
        NSHealthUpdateUsageDescription: "OMS writes completed workouts to Apple Health so your activity history stays in one place."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oms.app
        INFOPLIST_KEY_CFBundleDisplayName: OMS
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: OMS/OMS.entitlements

  OMSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OMSTests
    dependencies:
      - target: OMS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oms.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  OMS:
    build:
      targets:
        OMS: all
        OMSTests: [test]
    test:
      targets:
        - OMSTests
    run:
      config: Debug
    archive:
      config: Release
